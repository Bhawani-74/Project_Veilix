<!DOCTYPE html>
<html>
<head>
<title>Veilix</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h2 class="brand">Veilix</h2>
        <p class="subtitle" id="formTitle">Login</p>

        <input type="email" id="email" placeholder="Email" class="form-control mt-3">
        <input type="password" id="password" placeholder="Password" class="form-control mt-3">

        <button id="mainBtn" class="btn btn-primary mt-3 w-100" onclick="handleAuth()">
            Login
        </button>

        <div class="divider">or</div>

        <button class="google-btn">
            Continue with Google
        </button>

        <p id="status" class="mt-3"></p>

        <p class="mt-3 toggle-text">
            <span id="toggleText">Don't have an account?</span>
            <a href="#" onclick="toggleForm()" id="toggleLink">Sign Up</a>
        </p>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
