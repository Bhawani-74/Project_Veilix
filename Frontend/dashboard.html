<!DOCTYPE html>
<html>
<head>
<title>Dashboard - Veilix</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard-container">

    <div class="sidebar">
        <h3 class="logo">Veilix</h3>

        <ul>
            <li class="active" onclick="showSection(event, 'home')">Dashboard</li>
            <li onclick="showSection(event, 'protect')">Protect Image</li>
            <li onclick="showSection(event, 'profile')">Profile</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <div class="main">

        <div class="topbar">
            <h4>Dashboard</h4>
        </div>

        <div class="content">

            <div id="home" class="section active">
                <div class="cards">
                    <div class="card-box"><h5>Total Protected</h5><p>0</p></div>
                    <div class="card-box"><h5>Status</h5><p>Secure</p></div>
                    <div class="card-box"><h5>Account</h5><p>Active</p></div>
                </div>
            </div>

            <div id="protect" class="section">
                <div class="card-box">
                    <h4>Protect Image</h4>

                    <input type="file" id="imageInput" class="form-control mt-3">

                    <button class="btn btn-primary mt-3" onclick="uploadImage()">
                        Protect Image
                    </button>

                    <p id="status" class="mt-3"></p>

                    <img id="outputPreview" class="img-fluid mt-3">
                </div>
            </div>

            <div id="profile" class="section">
                <div class="card-box">
                    <h4>Profile</h4>
                    <p>Email: <span id="userEmail"></span></p>
                </div>
            </div>

        </div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
